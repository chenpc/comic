<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- 背景漸層：深海藍 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#0a2540"/>
    </linearGradient>
    <!-- 最前面的書：鮮豔青綠 -->
    <linearGradient id="book1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2aa"/>
      <stop offset="100%" style="stop-color:#00a388"/>
    </linearGradient>
    <!-- 中間的書：鋼藍 -->
    <linearGradient id="book2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2196c4"/>
      <stop offset="100%" style="stop-color:#1565a0"/>
    </linearGradient>
    <!-- 最後面的書：深藍青 -->
    <linearGradient id="book3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0e7490"/>
      <stop offset="100%" style="stop-color:#0c5a72"/>
    </linearGradient>
    <!-- 圓角遮罩 -->
    <clipPath id="roundRect">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
    <!-- 陰影 -->
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <!-- 光暈 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 圓角背景 -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <g clip-path="url(#roundRect)">

    <!-- 背景放射光（海洋感） -->
    <radialGradient id="radial" cx="50%" cy="55%" r="60%">
      <stop offset="0%" style="stop-color:#00d2aa18"/>
      <stop offset="100%" style="stop-color:#00000000"/>
    </radialGradient>
    <rect width="1024" height="1024" fill="url(#radial)"/>

    <!-- 裝飾網格線 -->
    <line x1="0" y1="340" x2="1024" y2="340" stroke="#ffffff06" stroke-width="1.5"/>
    <line x1="0" y1="680" x2="1024" y2="680" stroke="#ffffff06" stroke-width="1.5"/>
    <line x1="340" y1="0" x2="340" y2="1024" stroke="#ffffff06" stroke-width="1.5"/>
    <line x1="680" y1="0" x2="680" y2="1024" stroke="#ffffff06" stroke-width="1.5"/>

    <!-- 最底層的書（深藍青，向右傾 8°） -->
    <g transform="translate(512,530) rotate(8)">
      <rect x="-165" y="-210" width="32" height="420" rx="6" fill="#095a6e"/>
      <rect x="-133" y="-210" width="260" height="420" rx="6" fill="url(#book3)"/>
      <rect x="127" y="-205" width="8" height="410" rx="3" fill="#2ab8d0" opacity="0.5"/>
      <rect x="-105" y="-155" width="200" height="11" rx="5" fill="#ffffff20"/>
      <rect x="-105" y="-136" width="150" height="8" rx="4" fill="#ffffff12"/>
    </g>

    <!-- 中間的書（鋼藍，向左傾 5°） -->
    <g transform="translate(512,530) rotate(-5)">
      <rect x="-165" y="-210" width="32" height="420" rx="6" fill="#104e80"/>
      <rect x="-133" y="-210" width="260" height="420" rx="6" fill="url(#book2)"/>
      <rect x="127" y="-205" width="8" height="410" rx="3" fill="#5bc4e8" opacity="0.4"/>
      <rect x="-105" y="-155" width="200" height="11" rx="5" fill="#ffffff25"/>
      <rect x="-105" y="-136" width="160" height="8" rx="4" fill="#ffffff15"/>
      <circle cx="20" cy="40" r="65" fill="#ffffff08"/>
      <circle cx="20" cy="40" r="42" fill="#ffffff08"/>
    </g>

    <!-- 最前面的書（鮮豔青綠，正面） -->
    <g transform="translate(512,530)" filter="url(#shadow)">
      <!-- 書脊 -->
      <rect x="-165" y="-210" width="32" height="420" rx="6" fill="#007a60"/>
      <!-- 封面 -->
      <rect x="-133" y="-210" width="260" height="420" rx="6" fill="url(#book1)"/>
      <!-- 頁緣 -->
      <rect x="127" y="-205" width="8" height="410" rx="3" fill="#80ffe8" opacity="0.35"/>

      <!-- 大對話框 -->
      <rect x="-100" y="-170" width="185" height="88" rx="16" fill="white" opacity="0.96"/>
      <!-- 對話框尾巴 -->
      <polygon points="-60,-82 -38,-82 -52,-60" fill="white" opacity="0.96"/>
      <!-- 對話框內文字線 -->
      <rect x="-80" y="-153" width="145" height="9" rx="4" fill="#00a388" opacity="0.65"/>
      <rect x="-80" y="-137" width="108" height="9" rx="4" fill="#00a388" opacity="0.45"/>
      <rect x="-80" y="-121" width="125" height="9" rx="4" fill="#00a388" opacity="0.3"/>

      <!-- 小對話框 -->
      <rect x="18" y="-28" width="92" height="56" rx="12" fill="white" opacity="0.92"/>
      <polygon points="38,28 55,28 40,44" fill="white" opacity="0.92"/>
      <rect x="30" y="-14" width="68" height="7" rx="3" fill="#00a388" opacity="0.55"/>
      <rect x="30" y="-2" width="50" height="7" rx="3" fill="#00a388" opacity="0.38"/>

      <!-- 速度線 -->
      <line x1="-133" y1="82" x2="-48" y2="68" stroke="#ffffff28" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-133" y1="102" x2="-68" y2="93" stroke="#ffffff1a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-133" y1="120" x2="-42" y2="113" stroke="#ffffff12" stroke-width="1" stroke-linecap="round"/>

      <!-- 書名橫幅 -->
      <rect x="-133" y="132" width="260" height="54" rx="0" fill="#00000025"/>
      <rect x="-105" y="147" width="200" height="10" rx="5" fill="#ffffff85"/>
      <rect x="-72" y="164" width="135" height="8" rx="4" fill="#ffffff45"/>
    </g>

    <!-- 底部青綠光暈 -->
    <ellipse cx="512" cy="1024" rx="380" ry="140" fill="#00d2aa12"/>
    <!-- 頂部淡光 -->
    <ellipse cx="512" cy="0" rx="350" ry="100" fill="#2196c410"/>
  </g>
</svg>
